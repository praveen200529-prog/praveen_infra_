<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Praveen Infra Portal</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--navy-deep:#081524;--navy:#0c2038;--navy-mid:#122c49;--navy-soft:#1c3a5e;--gold:#c79a3d;--gold-light:#e8c778;--gold-dim:#9c7b32;--off-white:#f6f4ee;--paper:#f5f3ed;--slate:#5c6672;--slate-light:#8b93a0;--white:#ffffff;--line:rgba(10,27,46,0.08);--line-light:rgba(255,255,255,0.1);--sidebar-w:260px;--ease:cubic-bezier(.22,1,.36,1);--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'IBM Plex Mono',monospace;--success:#4caf87;--warning:#e8a33a;--danger:#e05252;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-body);background:var(--paper);color:var(--navy-deep);display:flex;min-height:100vh;}
a{color:inherit;text-decoration:none;}button{font-family:inherit;cursor:pointer;border:none;background:none;}
::selection{background:var(--gold);color:var(--navy-deep);}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--navy-deep);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;border-right:1px solid rgba(255,255,255,.06);}
.sidebar-logo{padding:28px 24px;border-bottom:1px solid var(--line-light);}
.sidebar-logo .brand{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--white);}
.sidebar-logo .brand span{color:var(--gold-light);}
.sidebar-logo .badge{font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;color:var(--gold-dim);text-transform:uppercase;margin-top:4px;}
.sidebar-user{padding:18px 24px;border-bottom:1px solid var(--line-light);display:flex;align-items:center;gap:12px;}
.user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dim),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--navy-deep);flex-shrink:0;}
.user-info .name{font-size:13.5px;font-weight:500;color:var(--white);}
.user-info .role{font-family:var(--font-mono);font-size:10px;color:var(--gold-dim);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-section{padding:8px 24px 4px;font-family:var(--font-mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:rgba(139,147,160,.5);}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;color:rgba(246,244,238,.6);font-size:13.5px;font-weight:500;transition:all .25s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--off-white);background:rgba(255,255,255,.04);}
.nav-item.active{color:var(--gold-light);border-left-color:var(--gold);background:rgba(199,154,61,.08);}
.nav-item svg{width:18px;height:18px;flex-shrink:0;opacity:.7;}
.nav-item.active svg,.nav-item:hover svg{opacity:1;}
.sidebar-footer{padding:20px 24px;border-top:1px solid var(--line-light);}
.btn-logout{display:flex;align-items:center;gap:10px;color:rgba(246,244,238,.5);font-size:13px;cursor:pointer;padding:10px 0;transition:color .25s;}
.btn-logout:hover{color:var(--danger);}
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--white);border-bottom:1px solid var(--line);padding:18px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:16px;}
.topbar h1{font-family:var(--font-display);font-size:22px;font-weight:600;}
.content{padding:36px;flex:1;}
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:28px;}
.filter-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.filter-tab{padding:8px 16px;border:1px solid var(--line);border-radius:20px;font-size:13px;color:var(--slate);cursor:pointer;transition:all .25s;font-family:var(--font-body);}
.filter-tab:hover,.filter-tab.active{background:var(--navy-deep);color:var(--off-white);border-color:var(--navy-deep);}
.search-box{position:relative;margin-left:auto;}
.search-box input{padding:9px 14px 9px 38px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;background:var(--white);color:var(--navy-deep);outline:none;width:220px;transition:border-color .25s;}
.search-box input:focus{border-color:var(--gold-dim);}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--slate-light);}
.btn-new{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--navy-deep);padding:10px 20px;border-radius:8px;font-size:13.5px;font-weight:600;transition:all .3s;white-space:nowrap;}
.btn-new:hover{background:var(--gold-light);box-shadow:0 6px 20px rgba(199,154,61,.3);}
.projects-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:1100px){.projects-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:700px){.projects-grid{grid-template-columns:1fr;}}
.proj-card{background:var(--white);border-radius:12px;border:1px solid var(--line);overflow:hidden;cursor:pointer;transition:all .3s var(--ease);display:flex;flex-direction:column;}
.proj-card:hover{box-shadow:0 8px 32px rgba(10,27,46,.1);transform:translateY(-3px);}
.proj-card-top{padding:24px;flex:1;}
.proj-card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.status-badge{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:20px;}
.status-Active{background:rgba(76,175,135,.15);color:#3a9e72;}
.status-Planning{background:rgba(28,58,94,.1);color:var(--navy-soft);}
.status-On-Hold{background:rgba(232,163,58,.15);color:var(--warning);}
.status-Completed{background:rgba(199,154,61,.15);color:var(--gold-dim);}
.status-Archived{background:rgba(139,147,160,.15);color:var(--slate-light);}
.proj-type{font-family:var(--font-mono);font-size:10px;color:var(--slate-light);letter-spacing:.06em;}
.proj-card h3{font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:6px;line-height:1.2;}
.proj-client{font-size:13px;color:var(--slate-light);margin-bottom:14px;}
.proj-location{font-size:12.5px;color:var(--slate);display:flex;align-items:center;gap:5px;}
.proj-location svg{width:14px;height:14px;}
.proj-progress-row{margin-top:16px;}
.prog-label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--slate-light);margin-bottom:6px;}
.prog-label strong{color:var(--navy-deep);font-weight:600;}
.prog-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold-light));border-radius:3px;}
.proj-card-bottom{padding:16px 24px;background:rgba(10,27,46,.03);border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.proj-value{font-family:var(--font-mono);font-size:13px;color:var(--navy-deep);font-weight:500;}
.proj-dates{font-size:11.5px;color:var(--slate-light);}
.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--slate-light);}
.empty-state svg{width:48px;height:48px;margin:0 auto 16px;opacity:.3;}
.empty-state p{font-size:15px;margin-bottom:8px;}
.empty-state small{font-size:13px;}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(6,15,26,.7);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.modal-bg.show{display:flex;}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.25);}
.modal-head{padding:24px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.modal-head h2{font-family:var(--font-display);font-size:18px;font-weight:600;}
.btn-close{width:32px;height:32px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s;}
.btn-close:hover{background:rgba(224,82,82,.15);}
.modal-body{padding:28px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row.full{grid-template-columns:1fr;}
.form-field label{display:block;font-size:12px;font-weight:500;color:var(--slate);letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;}
.form-field input,.form-field textarea,.form-field select{width:100%;padding:11px 13px;border:1px solid rgba(10,27,46,.15);border-radius:8px;font-family:var(--font-body);font-size:14px;color:var(--navy-deep);background:var(--white);outline:none;transition:border-color .2s;}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(199,154,61,.08);}
.form-field textarea{resize:vertical;min-height:90px;}
.modal-foot{padding:20px 28px;border-top:1px solid var(--line);display:flex;gap:12px;justify-content:flex-end;}
.btn-cancel{padding:10px 20px;border:1px solid var(--line);border-radius:8px;font-size:14px;color:var(--slate);cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--slate);background:rgba(10,27,46,.04);}
.btn-submit{padding:10px 24px;background:var(--gold);color:var(--navy-deep);border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;}
.btn-submit:hover{background:var(--gold-light);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;}
.alert-msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.alert-msg.error{background:rgba(224,82,82,.1);color:#c0392b;border:1px solid rgba(224,82,82,.2);display:block;}
.alert-msg.success{background:rgba(76,175,135,.1);color:#2e7d5f;border:1px solid rgba(76,175,135,.2);display:block;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="brand">PRAVEEN <span>INFRA</span></div><div class="badge">Internal Portal</div></div>
  <div class="sidebar-user"><div class="user-avatar" id="userAvatar">PI</div><div class="user-info"><div class="name" id="userName">—</div><div class="role" id="userRole">—</div></div></div>
  <nav class="sidebar-nav">
    <div class="nav-section">Main</div>
    <a class="nav-item" href="/portal/dashboard"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
    <a class="nav-item active" href="/portal/projects"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>Projects</a>
    <a class="nav-item" href="/portal/analytics"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>Analytics</a>
    <a class="nav-item" href="/portal/enquiries"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>Enquiries</a>
    <div class="nav-section admin-only" style="display:none">Admin</div>
    <a class="nav-item admin-only" href="/portal/users" style="display:none"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>User Management</a>
  </nav>
  <div class="sidebar-footer"><button class="btn-logout" id="logoutBtn"><svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign Out</button></div>
</aside>

<main class="main">
  <div class="topbar">
    <h1>Projects</h1>
    <button class="btn-new admin-only" id="btnNewProject" style="display:none">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      New Project
    </button>
  </div>
  <div class="content">
    <div class="toolbar">
      <div class="filter-tabs">
        <button class="filter-tab active" data-status="">All</button>
        <button class="filter-tab" data-status="Active">Active</button>
        <button class="filter-tab" data-status="Planning">Planning</button>
        <button class="filter-tab" data-status="On Hold">On Hold</button>
        <button class="filter-tab" data-status="Completed">Completed</button>
        <button class="filter-tab" data-status="Archived">Archived</button>
      </div>
      <div class="search-box">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
        <input type="search" id="searchInput" placeholder="Search projects…">
      </div>
    </div>
    <div class="projects-grid" id="projectsGrid">
      <div class="empty-state"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/></svg><p>Loading projects…</p></div>
    </div>
  </div>
</main>

<!-- New Project Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-head">
      <h2>New Project</h2>
      <button class="btn-close" id="btnCloseModal"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="alert-msg" id="modalAlert"></div>
      <div class="form-row">
        <div class="form-field"><label>Project Name *</label><input type="text" id="fName" placeholder="e.g. Highway Phase 2"></div>
        <div class="form-field"><label>Client *</label><input type="text" id="fClient" placeholder="Client name"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Location</label><input type="text" id="fLocation" placeholder="City, State"></div>
        <div class="form-field"><label>Project Manager</label><input type="text" id="fPM" placeholder="Name"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Contract Value (₹)</label><input type="number" id="fContract" placeholder="0"></div>
        <div class="form-field"><label>Budget (₹)</label><input type="number" id="fBudget" placeholder="0"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Start Date</label><input type="date" id="fStart"></div>
        <div class="form-field"><label>End Date</label><input type="date" id="fEnd"></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Status</label>
          <select id="fStatus">
            <option value="Planning">Planning</option>
            <option value="Active">Active</option>
            <option value="On Hold">On Hold</option>
            <option value="Completed">Completed</option>
          </select>
        </div>
        <div class="form-field"><label>Progress (%)</label><input type="number" id="fProgress" placeholder="0" min="0" max="100"></div>
      </div>
      <div class="form-row full">
        <div class="form-field"><label>Tags (comma-separated)</label><input type="text" id="fTags" placeholder="Residential, Roads, Government…"></div>
      </div>
      <div class="form-row full">
        <div class="form-field"><label>Description</label><textarea id="fDesc" placeholder="Project overview, scope of work…"></textarea></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="btnCancelModal">Cancel</button>
      <button class="btn-submit" id="btnSaveProject">Create Project</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('pi_token');
const user  = JSON.parse(localStorage.getItem('pi_user') || 'null');
if (!token || !user) window.location.href = '/portal/login';

document.getElementById('userName').textContent  = user?.name;
document.getElementById('userRole').textContent  = user?.role;
document.getElementById('userAvatar').textContent = (user?.name||'PI').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
if (user?.role === 'admin') { document.querySelectorAll('.admin-only').forEach(el => el.style.display = ''); }
document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href='/portal/login'; });

const api = (url, opts={}) => fetch(url, { ...opts, headers: { Authorization:'Bearer '+token, 'Content-Type':'application/json', ...opts.headers } })
  .then(r => { if(r.status===401) window.location.href='/portal/login'; return r.json(); });

function fmt(n){if(n>=10000000)return'₹'+(n/10000000).toFixed(2)+'Cr';if(n>=100000)return'₹'+(n/100000).toFixed(2)+'L';return'₹'+Number(n||0).toLocaleString('en-IN');}
const STATUS_COLORS={'Active':'#4caf87','Planning':'#1c3a5e','On Hold':'#e8a33a','Completed':'#c79a3d','Archived':'#8b93a0'};

let allProjects = [];
let activeFilter = '';

function renderProjects(list) {
  const grid = document.getElementById('projectsGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = list.filter(p => {
    const matchStatus = !activeFilter || p.status === activeFilter;
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.client.toLowerCase().includes(search) || (p.location||'').toLowerCase().includes(search);
    return matchStatus && matchSearch;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" width="48" height="48"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5"/></svg><p>No projects found</p><small>Try a different filter or search term</small></div>';
    return;
  }

  grid.innerHTML = filtered.map(p => `
    <a class="proj-card" href="/portal/projects/${p.id}">
      <div class="proj-card-top">
        <div class="proj-card-meta">
          <span class="status-badge status-${p.status.replace(' ','-')}">${p.status}</span>
          <span class="proj-type">${p.tags ? p.tags.split(',')[0].trim() : 'General'}</span>
        </div>
        <h3>${p.name}</h3>
        <div class="proj-client">${p.client}</div>
        ${p.location ? `<div class="proj-location"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${p.location}</div>` : ''}
        <div class="proj-progress-row">
          <div class="prog-label"><span>Progress</span><strong>${p.progress_pct||0}%</strong></div>
          <div class="prog-bar"><div class="prog-fill" style="width:${p.progress_pct||0}%"></div></div>
        </div>
      </div>
      <div class="proj-card-bottom">
        <div class="proj-value">${fmt(p.contract_value)}</div>
        <div class="proj-dates">${p.end_date ? 'Due '+new Date(p.end_date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : 'No end date'}</div>
      </div>
    </a>`).join('');
}

api('/portal/api/projects').then(data => {
  allProjects = data.projects || [];
  renderProjects(allProjects);
});

document.querySelectorAll('.filter-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.status;
    renderProjects(allProjects);
  });
});

document.getElementById('searchInput').addEventListener('input', () => renderProjects(allProjects));

// Modal
const modalBg = document.getElementById('modalBg');
document.getElementById('btnNewProject')?.addEventListener('click', () => modalBg.classList.add('show'));
document.getElementById('btnCloseModal').addEventListener('click', () => modalBg.classList.remove('show'));
document.getElementById('btnCancelModal').addEventListener('click', () => modalBg.classList.remove('show'));
modalBg.addEventListener('click', e => { if(e.target===modalBg) modalBg.classList.remove('show'); });

document.getElementById('btnSaveProject').addEventListener('click', async () => {
  const name   = document.getElementById('fName').value.trim();
  const client = document.getElementById('fClient').value.trim();
  const alertEl = document.getElementById('modalAlert');
  alertEl.className = 'alert-msg';

  if (!name || !client) { alertEl.className='alert-msg error'; alertEl.textContent='Project name and client are required.'; return; }

  const body = {
    name, client,
    location:       document.getElementById('fLocation').value.trim() || null,
    project_manager:document.getElementById('fPM').value.trim() || null,
    contract_value: parseFloat(document.getElementById('fContract').value) || 0,
    budget:         parseFloat(document.getElementById('fBudget').value) || 0,
    start_date:     document.getElementById('fStart').value || null,
    end_date:       document.getElementById('fEnd').value || null,
    status:         document.getElementById('fStatus').value,
    progress_pct:   parseInt(document.getElementById('fProgress').value) || 0,
    tags:           document.getElementById('fTags').value.trim() || null,
    description:    document.getElementById('fDesc').value.trim() || null,
  };

  const btn = document.getElementById('btnSaveProject');
  btn.disabled = true; btn.textContent = 'Creating…';

  const data = await api('/portal/api/projects', { method:'POST', body: JSON.stringify(body) });
  btn.disabled = false; btn.textContent = 'Create Project';

  if (data.success) {
    alertEl.className='alert-msg success'; alertEl.textContent='Project created!';
    setTimeout(() => { window.location.href = '/portal/projects/'+data.projectId; }, 800);
  } else {
    alertEl.className='alert-msg error'; alertEl.textContent = data.message || 'Error creating project.';
  }
});
</script>
</body>
</html>
